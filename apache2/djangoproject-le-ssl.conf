<IfModule mod_ssl.c>

<VirtualHost *:443>

	ServerAdmin lpsoares@insper.edu.br
	ServerName pfe.insper.edu.br
	#ServerAlias pfe.insper.edu.br
	DocumentRoot /home/ubuntu/pfe
	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined

	# Uploads longos precisam de folga, mas com limites finitos para evitar que
	# conexões travadas consumam workers do Apache por tempo indefinido.
	# Aqui o body ganha tempo conforme chegam bytes, mas nunca passa de 30 min.
	TimeOut 120
	RequestReadTimeout header=20-40,MinRate=500 body=30-1800,MinRate=500

	Alias /static /home/ubuntu/pfe/static
	<Directory /home/ubuntu/pfe/static>
		Require all granted
	</Directory>

	Alias /static /home/ubuntu/pfe/media
	<Directory /home/ubuntu/pfe/media>
		Require all granted
	</Directory>

	<Directory /home/ubuntu/pfe/pfe>
		<Files wsgi.py>
			Require all granted
		</Files>
	</Directory>

	WSGIDaemonProcess pgadmin processes=1 threads=25 python-path=/home/ubuntu/pfe python-home=/home/ubuntu/pfe/env
	WSGIScriptAlias /sql /home/ubuntu/pfe/env/lib/python3.6/site-packages/pgadmin4/pgAdmin4.wsgi

	<Directory "/home/ubuntu/pfe/env/lib/python3.6/site-packages/pgadmin4/" >
        WSGIProcessGroup pgadmin
        WSGIApplicationGroup %{GLOBAL}
        Require all granted
	</Directory>

	# Esta instancia tem pouca RAM. Limitamos explicitamente a concorrencia do
	# daemon WSGI para evitar que uploads/requests longas esgotem memoria e
	# derrubem o servidor inteiro.
	WSGIDaemonProcess pfe processes=1 threads=8 python-path=/home/ubuntu/pfe python-home=/home/ubuntu/pfe/env connect-timeout=30 socket-timeout=2000 queue-timeout=45
	WSGIProcessGroup pfe
	WSGIScriptAlias / /home/ubuntu/pfe/pfe/wsgi.py

	SSLCertificateFile /etc/letsencrypt/live/pfe.insper.edu.br/fullchain.pem
	SSLCertificateKeyFile /etc/letsencrypt/live/pfe.insper.edu.br/privkey.pem
	Include /etc/letsencrypt/options-ssl-apache.conf

</VirtualHost>
</IfModule>
